<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonehenge - Phase 1: Origins</title>
    <link rel="stylesheet" href="css/style.css">

<body>
    <div id="viewer" class="viewer-container"></div>

        <div class="phase-badge">🏛️ PHASE 1</div>

    <div class="nav-buttons">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        // 1. The "?v=6" forces your phone to download the new Auto-Frame code!

        import { initViewer } from './js/viewer.js?v=6'; 
        
        // 2. Look how clean this is! No more manual camera numbers.
        // The Auto-Frame handles everything automatically now.
        initViewer('viewer', {
            phaseIndex: 0
        });
