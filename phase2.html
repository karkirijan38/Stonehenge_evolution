<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonehenge - Phase 2: First Stones (2500 BCE)</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="viewer-body">
    <div id="viewer" class="viewer-container"></div>
    
    <div class="info-panel">
        <div class="phase-badge">🪨 PHASE 2</div>
        <h1>First Stones (2500 BCE)</h1>
        <p>Small bluestones arrive from Wales — the first stone circle. About 80 bluestones were arranged in an incomplete circle.</p>
    </div>
    
    <div class="nav-buttons">
        <a href="phase1.html" class="nav-btn">← Previous: Origins</a>
        <a href="index.html" class="nav-btn">All Phases</a>
        <a href="phase3.html" class="nav-btn">Next: Great Monument →</a>
    </div>
    
    <div class="instructions">
        <span>🖱️ Drag to rotate</span>
        <span>📌 Scroll to zoom</span>
    </div>
    
    <div id="loading" class="loading">📦 Loading 3D scene...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/sound.js"></script>
    <script type="module">
        import { initViewer } from './js/viewer.js';
        
        initViewer('viewer', {
            name: 'phase2_bluestones',
            phaseIndex: 1,
            showBluestones: true,
            showSarsen: false,
            showFallen: false,
            showAvenue: false,
            cameraX: 12, cameraY: 8, cameraZ: 17
        });
    </script>
    
    <script type="module">
        import { initVoiceover, updateCurrentPhase, killVoice } from './js/sound.js';
        
        initVoiceover();
        updateCurrentPhase(1);
        
        window.addEventListener('beforeunload', () => killVoice());
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => killVoice());
        });
    </script>
</body>
</html>
